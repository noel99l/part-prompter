<svg xmlns="http://www.w3.org/2000/svg" width="390" height="844"><foreignObject width="390" height="844"><div xmlns="http://www.w3.org/1999/xhtml" class="app"><style>*{box-sizing:border-box}.app{height:844px;background:#080808;color:#fff;font:13px -apple-system,'Hiragino Sans',sans-serif;position:relative}.top{height:55px;padding:0 14px;display:flex;justify-content:space-between;align-items:center;background:#0d0a0d;border-bottom:2px solid #ff69b4}.logo{font-weight:900}.pink{color:#ff69b4}.main{padding:18px 14px}.head{display:flex;justify-content:space-between;align-items:center}.head h1{font-size:19px}.tabs{display:flex;border-bottom:1px solid #292929}.tab{flex:1;padding:13px 4px;text-align:center;color:#777;font-size:18px}.tab.on{color:#ff69b4;border-bottom:2px solid #ff69b4}.panel{margin-top:18px;padding:15px;border:1px solid #292929;border-radius:8px;background:#101010}.field{margin:12px 0}.field label{display:block;margin-bottom:6px;color:#888;font-size:11px}.input{padding:11px;border:1px solid #333;border-radius:6px;background:#090909}.member{display:grid;grid-template-columns:27px 1fr 28px;gap:8px;align-items:center;margin:10px 0}.dot{width:25px;height:25px;border-radius:50%}.palette{grid-column:1/-1;height:24px;border-radius:4px;background:linear-gradient(90deg,#ff69b4 0 20%,#55a7ff 20% 40%,#62e69a 40% 60%,#ffd166 60% 80%,#a78bfa 80%)}.save{position:absolute;left:0;right:0;bottom:0;height:76px;padding:0 14px;display:flex;align-items:center;justify-content:space-between;border-top:1px solid #333;background:#111}.btn{padding:11px;border-radius:7px;background:#ff69b4;font-weight:700;font-size:12px}</style><header class="top"><div class="logo">PART<span class="pink">-</span>PROMPTER</div><div>☰</div></header><main class="main"><div class="head"><h1>🎨 パート分け</h1><span>⋯</span></div><div class="tabs"><div class="tab on">📝</div><div class="tab">🎵</div><div class="tab">🎨</div><div class="tab">▶</div></div><section class="panel"><h3>楽曲情報</h3><div class="field"><label>曲名</label><div class="input">Sample Song</div></div><div class="field"><label>アーティスト</label><div class="input">Demo Artist</div></div><h3>パートメンバー</h3><div class="member"><b>A</b><div class="input">Main</div><i class="dot" style="background:#ff69b4"></i><i class="palette"></i></div><div class="member"><b>B</b><div class="input">Chorus</div><i class="dot" style="background:#55a7ff"></i><i class="palette"></i></div></section><div class="save"><span class="pink">● 未保存</span><span class="btn">💾 すべて保存</span></div></main></div></foreignObject></svg>