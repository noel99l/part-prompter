<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900"><foreignObject width="1440" height="900"><div xmlns="http://www.w3.org/1999/xhtml" class="app"><style>*{box-sizing:border-box}.app{height:900px;background:#080808;color:#fff;font:14px -apple-system,'Hiragino Sans',sans-serif}.top{height:58px;padding:0 28px;display:flex;justify-content:space-between;align-items:center;background:#0d0a0d;border-bottom:2px solid #ff69b4}.logo{font-weight:900;letter-spacing:.08em}.pink{color:#ff69b4}.layout{display:grid;grid-template-columns:220px 1fr}.side{height:842px;padding:25px 14px;border-right:1px solid #222}.side span{display:block;padding:12px;color:#777}.side .on{color:#ff69b4;background:#181016}.main{padding:34px 44px;position:relative;height:842px}.head{display:flex;justify-content:space-between}.head h1{margin:0}.tabs{display:flex;margin-top:25px;border-bottom:1px solid #292929}.tab{padding:14px 22px;color:#777}.tab.on{color:#ff69b4;border-bottom:2px solid #ff69b4}.panel{margin-top:24px;padding:25px;border:1px solid #292929;border-radius:9px;background:#101010}.fields{display:grid;grid-template-columns:1fr 1fr;gap:14px}.field label{display:block;margin-bottom:7px;color:#888;font-size:12px}.input{padding:12px;border:1px solid #333;border-radius:6px;background:#090909}.member{display:grid;grid-template-columns:35px 1fr 38px 1.5fr 25px;gap:10px;align-items:center;margin:11px 0}.dot{width:27px;height:27px;border-radius:50%}.palette{height:28px;border-radius:5px;background:linear-gradient(90deg,#ff69b4 0 20%,#55a7ff 20% 40%,#62e69a 40% 60%,#ffd166 60% 80%,#a78bfa 80%)}.save{position:absolute;left:0;right:0;bottom:0;height:74px;padding:0 44px;display:flex;align-items:center;justify-content:flex-end;gap:22px;border-top:1px solid #333;background:#111}.btn{padding:12px 18px;border-radius:7px;background:#ff69b4;font-weight:700}</style><header class="top"><div class="logo">PART<span class="pink">-</span>PROMPTER <small class="pink">管理</small></div><div>☰</div></header><div class="layout"><aside class="side"><span class="on">🎨 パート分け管理</span><span>🎵 セットリスト管理</span><span>⚙ アカウント設定</span></aside><main class="main"><div class="head"><h1>🎨 パート分け</h1><span>⋯ メニュー</span></div><div class="tabs"><div class="tab on">📝 楽曲情報</div><div class="tab">🎵 歌詞編集</div><div class="tab">🎨 パート分け</div><div class="tab">▶ プロンプター設定</div></div><section class="panel"><h2>楽曲情報</h2><div class="fields"><div class="field"><label>曲名</label><div class="input">Sample Song</div></div><div class="field"><label>アーティスト</label><div class="input">Demo Artist</div></div></div><h2>パートメンバー</h2><div class="member"><b>A</b><div class="input">Main</div><i class="dot" style="background:#ff69b4"></i><i class="palette"></i><b>×</b></div><div class="member"><b>B</b><div class="input">Chorus</div><i class="dot" style="background:#55a7ff"></i><i class="palette"></i><b>×</b></div><div class="member"><b>C</b><div class="input">Harmony</div><i class="dot" style="background:#62e69a"></i><i class="palette"></i><b>×</b></div></section><div class="save"><span class="pink">● 未保存の変更があります</span><span class="btn">💾 すべて保存</span></div></main></div></div></foreignObject></svg>