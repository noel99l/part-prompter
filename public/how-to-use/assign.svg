<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900"><foreignObject width="1440" height="900"><div xmlns="http://www.w3.org/1999/xhtml" class="app"><style>*{box-sizing:border-box}.app{height:900px;background:#0a0a0a;color:#fff;font:14px -apple-system,'Hiragino Sans',sans-serif}.top{height:50px;padding:0 24px;display:flex;justify-content:space-between;align-items:center;background:#0d0a0d;border-bottom:2px solid #ff69b4}.logo{font-weight:900;letter-spacing:.08em}.pink{color:#ff69b4}.layout{display:grid;grid-template-columns:220px 1fr;height:850px}.side{padding:24px 14px;border-right:1px solid #1a1a1a}.side span{display:block;padding:12px;color:#888}.side .on{color:#ff69b4;background:#181016;border-radius:6px}.main{padding:24px;position:relative;overflow:hidden}.head{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px}.head h1{margin:0;font-size:24px}.actions{display:flex;align-items:center;gap:14px;color:#ff69b4}.more{padding:8px 13px;border:1px solid #333;border-radius:8px;color:#aaa}.tabs{display:flex;gap:8px;padding-bottom:8px;border-bottom:1px solid #222}.tab{padding:9px 16px;color:#888;border-radius:6px 6px 0 0}.tab.on{color:#fff;background:#1a1a1a;border-bottom:2px solid #ff69b4}.hint{margin:22px 0;color:#777;font-size:13px}.editor{display:grid;grid-template-columns:200px 1fr;gap:24px}.selector,.blocks{border:1px solid #222;border-radius:8px;background:#111}.selector{padding:16px;height:max-content}.selectorTitle{color:#888;font-size:12px;line-height:1.5}.modes{display:grid;grid-template-columns:repeat(3,1fr);gap:4px;margin:13px 0}.mode{padding:7px 2px;text-align:center;border:1px solid #333;border-radius:5px;color:#888;font-size:11px}.mode.on{color:#fff;border-color:#ff69b4;background:#281521}.person{display:flex;align-items:center;gap:9px;padding:8px 5px}.check{width:16px;height:16px;border:1px solid #ff69b4;border-radius:3px;background:#ff69b4;position:relative}.check:after{content:'✓';position:absolute;left:2px;top:-2px;color:#111;font-weight:900}.dot{width:14px;height:14px;border-radius:50%}.selected{margin-top:12px;padding-top:11px;border-top:1px solid #222;color:#888;font-size:12px}.clear{margin-top:10px;padding:7px;text-align:center;border:1px solid #333;border-radius:4px;color:#888}.blocks{overflow:hidden;background:#0a0a0a}.blockLabel{display:flex;align-items:center;gap:9px;padding:7px 12px;color:#ff69b4;font-size:11px}.blockLabel:before,.blockLabel:after{content:'';height:2px;flex:1;background:#ff69b4;opacity:.6}.line{display:flex;align-items:center;gap:14px;padding:10px 14px;border-bottom:1px solid #1a1a1a;font-size:20px;font-weight:700}.time{width:50px;color:#555;font:11px monospace}.red{color:#ff4444}.blue{color:#1e90ff}.green{color:#7cfc00}.add{padding:5px;text-align:center;color:#555;border-bottom:1px solid #1a1a1a;font-size:10px}.save{position:absolute;left:0;right:0;bottom:0;height:70px;padding:0 24px;display:flex;align-items:center;justify-content:flex-end;gap:20px;border-top:1px solid #333;background:#111}.btn{padding:12px 18px;border-radius:7px;background:#ff69b4;font-weight:700}</style><header class="top"><div class="logo">PART<span class="pink">-</span>PROMPTER <small class="pink">管理</small></div><div>☰</div></header><div class="layout"><aside class="side"><span class="on">🎨 パート分け管理</span><span>🎵 セットリスト管理</span><span>⚙ アカウント設定</span></aside><main class="main"><div class="head"><h1>🎨 パート分け</h1><div class="actions"><span>▶ プロンプター表示 ↗</span><span class="more">⋯</span></div></div><div class="tabs"><div class="tab">📝 楽曲情報</div><div class="tab">🎵 歌詞編集</div><div class="tab on">🎨 パート分け</div><div class="tab">▶ プロンプター設定</div></div><p class="hint">行間の「＋ 区切り追加」でブロックを分割。ダブルタップで行全体、長押しなぞりで文字単位に割り当てできます。</p><div class="editor"><aside class="selector"><div class="selectorTitle">歌唱者を選択してから歌詞をなぞってください</div><div class="modes"><span class="mode">上ハモ</span><span class="mode on">メイン</span><span class="mode">下ハモ</span></div><div class="person"><i class="check"></i><i class="dot" style="background:#ff4444"></i><span>Main</span></div><div class="person"><i class="check"></i><i class="dot" style="background:#1e90ff"></i><span>Chorus</span></div><div class="person"><i class="dot" style="margin-left:25px;background:#7cfc00"></i><span>Harmony</span></div><div class="selected">選択中： 🔴 🔵</div><div class="clear">選択解除</div></aside><section class="blocks"><div class="blockLabel">ブロック 1</div><div class="line"><span class="time">00:12.40</span><span class="red">それぞれの声が</span></div><div class="line"><span class="time">00:16.80</span><span><b class="blue">ひとつに</b><b class="red">重なって</b></span></div><div class="add">＋ 区切り追加</div><div class="blockLabel">ブロック 2</div><div class="line"><span class="time">00:21.10</span><span class="green">新しい景色になる</span></div><div class="line"><span class="time">00:25.30</span><span><b class="red">さあ、</b><b class="blue">次のステージへ</b></span></div></section></div><div class="save"><span class="pink">● 未保存の変更があります</span><span class="btn">💾 すべて保存</span></div></main></div></div></foreignObject></svg>