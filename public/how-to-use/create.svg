<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900"><foreignObject width="1440" height="900"><div xmlns="http://www.w3.org/1999/xhtml" class="app"><style>*{box-sizing:border-box}body{margin:0}.app{height:900px;background:#080808;color:#fff;font:14px -apple-system,BlinkMacSystemFont,'Hiragino Sans',sans-serif}.top{height:58px;padding:0 28px;display:flex;align-items:center;justify-content:space-between;background:#0d0a0d;border-bottom:2px solid #ff69b4}.logo{font-weight:900;letter-spacing:.08em}.pink{color:#ff69b4}.layout{display:grid;grid-template-columns:220px 1fr;height:842px}.side{padding:25px 14px;border-right:1px solid #222}.side span{display:block;padding:12px;color:#777}.side .on{color:#ff69b4;background:#181016;border-radius:7px}.main{padding:38px 44px;position:relative}.title{display:flex;justify-content:space-between;align-items:center}.title h1{font-size:26px}.btn{padding:12px 18px;border-radius:7px;background:#ff69b4;font-weight:700}.search{margin-top:20px;padding:14px;border:1px solid #333;border-radius:8px;background:#111;color:#777}.card{margin-top:13px;padding:18px;border:1px solid #292929;border-radius:8px;background:#111}.shade{position:absolute;inset:0;display:grid;place-items:center;background:#0009}.modal{width:520px;padding:26px;border:1px solid #444;border-radius:13px;background:#161616;box-shadow:0 25px 80px #000}.tabs{display:flex;border-bottom:1px solid #333}.tab{padding:13px 20px;color:#777}.tab.on{color:#ff69b4;border-bottom:2px solid #ff69b4}.field{margin-top:20px}.field label{display:block;margin-bottom:8px;color:#aaa}.field div{padding:13px;border:1px solid #383838;border-radius:7px;background:#090909;color:#ddd}.result{display:flex;align-items:center;justify-content:space-between;margin-top:15px;padding:16px;border:1px solid #333;border-radius:8px}.muted{color:#777;font-size:12px}</style><header class="top"><div class="logo">PART<span class="pink">-</span>PROMPTER <small class="pink">管理</small></div><div>☰</div></header><div class="layout"><aside class="side"><span class="on">🎨 パート分け管理</span><span>🎵 セットリスト管理</span><span>⚙ アカウント設定</span></aside><main class="main"><div class="title"><h1>🎨 パート分け管理</h1><div class="btn">＋ 曲を追加</div></div><div class="search">曲名・アーティストで検索...</div><div class="card"><b>Sample Song</b><p class="muted">Demo Artist　👥 3　タイムスタンプ</p></div><div class="shade"><section class="modal"><h2>楽曲を追加</h2><div class="tabs"><div class="tab on">LRCLIBで検索</div><div class="tab">手動で追加</div></div><div class="field"><label>曲名またはアーティスト</label><div>Sample Song</div></div><div class="result"><div><b>Sample Song</b><p class="muted">Demo Artist</p></div><span class="btn">追加</span></div></section></div></main></div></div></foreignObject></svg>