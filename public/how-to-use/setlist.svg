<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900"><foreignObject width="1440" height="900"><div xmlns="http://www.w3.org/1999/xhtml" class="app"><style>*{box-sizing:border-box}.app{height:900px;background:#080808;color:#fff;font:14px -apple-system,'Hiragino Sans',sans-serif}.top{height:58px;padding:0 28px;display:flex;justify-content:space-between;align-items:center;background:#0d0a0d;border-bottom:2px solid #ff69b4}.logo{font-weight:900}.pink{color:#ff69b4}.layout{display:grid;grid-template-columns:220px 1fr}.side{height:842px;padding:25px 14px;border-right:1px solid #222}.side span{display:block;padding:12px;color:#777}.side .on{color:#ff69b4;background:#181016}.main{padding:40px 50px}.head{display:flex;justify-content:space-between}.head h1{margin:0 0 8px}.muted{color:#777}.btn{padding:12px 18px;border-radius:7px;background:#ff69b4;font-weight:700}.start{display:inline-block;margin:28px 0 16px;padding:12px 18px;border:1px solid #444;border-radius:7px}.card{display:grid;grid-template-columns:42px 48px 1fr auto;align-items:center;margin:13px 0;padding:19px;border:1px solid #292929;border-radius:8px;background:#111}.handle{color:#555;font-size:22px}.num{color:#ff69b4;font-weight:900}.card b{font-size:17px}</style><header class="top"><div class="logo">PART<span class="pink">-</span>PROMPTER <small class="pink">管理</small></div><div>☰</div></header><div class="layout"><aside class="side"><span>🎨 パート分け管理</span><span class="on">🎵 セットリスト管理</span><span>⚙ アカウント設定</span></aside><main class="main"><div class="head"><div><h1>🎵 LIVE SET 01</h1><span class="muted">全3曲・本番用セットリスト</span></div><span class="btn">＋ 曲を追加</span></div><div class="start">▶ セットリストを開始</div><div class="card"><span class="handle">⠿</span><span class="num">1</span><div><b>Sample Song</b><p class="muted">Demo Artist</p></div><b>×</b></div><div class="card"><span class="handle">⠿</span><span class="num">2</span><div><b>Harmony Line</b><p class="muted">Demo Artist</p></div><b>×</b></div><div class