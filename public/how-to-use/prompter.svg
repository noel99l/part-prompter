<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900"><foreignObject width="1440" height="900"><div xmlns="http://www.w3.org/1999/xhtml" class="stage"><style>*{box-sizing:border-box}.stage{height:900px;padding:42px 58px;background:#000;color:#fff;font-family:-apple-system,'Hiragino Sans',sans-serif;position:relative;overflow:hidden}.current{position:relative;z-index:2;display:flex;flex-direction:column;gap:7px;font-size:72px;line-height:1.3;font-weight:900}.current div{margin-bottom:18px}.red{color:#ff4444}.blue{color:#1e90ff}.green{color:#7cfc00}.next{position:absolute;left:58px;right:58px;bottom:92px;z-index:1;padding-top:12px;border-top:4px solid #ff69b4;opacity:.65;font-size:48px;line-height:1.3;font-weight:900;max-height:140px;overflow:hidden}.controls{position:absolute;right:24px;bottom:22px;z-index:10;display:flex;gap:8px}.btn{min-width:52px;height:48px;padding:0 13px;display:grid;place-items:center;border-radius:8px;background:rgba(255,255,255,.15);font-size:20px;backdrop-filter:blur(4px)}.auto{width:72px}.hint{position:absolute;left:58px;bottom:28px;color:#333;font-size:12px}</style><div class="current"><div class="red">それぞれの声が</div><div><span class="blue">ひとつに</span><span class="red">重なって</span></div></div><div class="next"><div class="green">新しい景色になる</div><div><span class="red">さあ、</span><span class="blue">次のステージへ</span></div></div><div class="hint">画面の左側で戻る　／　右側で進む</div><div class="controls"><span class="btn">◀</span><span class="btn auto">▶</span><span class="btn">▶</span><span class="btn">⚙</span><span class="btn">⛶</span></div></div></foreignObject></svg>