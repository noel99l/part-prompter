<svg xmlns="http://www.w3.org/2000/svg" width="390" height="844"><foreignObject width="390" height="844"><div xmlns="http://www.w3.org/1999/xhtml" class="stage"><style>*{box-sizing:border-box}.stage{height:844px;padding:34px 16px 84px;background:#000;color:#fff;font-family:-apple-system,'Hiragino Sans',sans-serif;position:relative}.block{padding:12px 8px 12px 12px;border-left:3px solid transparent;font-size:24px;line-height:1.5;font-weight:800}.block.on{border-left-color:#ff69b4;background:rgba(255,105,180,.06)}.red{color:#ff4444}.blue{color:#1e90ff}.green{color:#7cfc00}.controls{position:absolute;right:14px;bottom:15px;display:flex;flex-direction:column;gap:7px}.btn{width:46px;height:42px;display:grid;place-items:center;border-radius:8px;background:rgba(255,255,255,.15)}.end{text-align:center;margin-top:35px;color:#444;font-style:italic}</style><div class="block on"><div class="red">それぞれの声が</div><div><span class="blue">ひとつに</span><span class="red">重なって</span></div></div><div class="block"><div class="green">新しい景色になる</div><div><span class="red">さあ、</span><span class="blue">次のステージへ</span></div></div><div class="block"><div class="blue">声を合わせて進もう</div></div><div class="end">― End ―</div><div class="controls"><span class="btn">⚙</span><span class="btn">⛶</span></div></div></foreignObject></svg>